name: PR Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SCHEMA_FILE: schema.graphql
      SCHEMA_ARTIFACT: schema
    outputs:
      schema: ${{ env.SCHEMA_FILE }}
      schema_artifact: ${{ env.SCHEMA_ARTIFACT }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
      - name: Execute Gradle build
        run: ./gradlew check graphqlGenerateSDL
      - name: Upload schema artifact
        uses: actions/upload-artifact@v7
        with:
          path: build/${{ env.SCHEMA_FILE }}
          name: ${{ env.SCHEMA_ARTIFACT }}

  check_schema:
    name: Check Schema with Apollo Studio
    if: false
    needs: [ test ]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # rename this to a valid subgraph name
      SUBGRAPH_NAME: foo-bar
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: ${{ needs.test.outputs.schema_artifact }}
      - name: Install Rover
        run: |
          curl -sSL https://rover.apollo.dev/nix/latest | sh
          echo "$HOME/.rover/bin" >> $GITHUB_PATH
      - name: Schema Check
        run: rover subgraph check ${{ secrets.APOLLO_GRAPH_REF }} --schema ${{ needs.test.outputs.schema }} --name ${{ env.SUBGRAPH_NAME }}
        env:
          APOLLO_KEY: ${{ secrets.APOLLO_KEY }}

  compose:
    name: Composition Check
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Download schema artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.test.outputs.schema_artifact }}
      - name: Install Rover
        run: |
          curl -sSL https://rover.apollo.dev/nix/latest | sh
          echo "$HOME/.rover/bin" >> $GITHUB_PATH
      - name: Compose
        run: |
          echo "federation_version: =2.10.0" > /tmp/supergraph.yaml
          echo "subgraphs:" >> /tmp/supergraph.yaml
          echo "  template:" >> /tmp/supergraph.yaml
          echo "    routing_url: http://localhost:8080/graphql" >> /tmp/supergraph.yaml
          echo "    schema:" >> /tmp/supergraph.yaml
          echo "      file: ./${{ needs.test.outputs.schema }}" >> /tmp/supergraph.yaml
          rover supergraph compose --config /tmp/supergraph.yaml
